name: gh-autoloop

on:
  schedule:
    - cron: '0 2 * * *'   # daily at 02:00 UTC
  workflow_dispatch:
    inputs:
      label:
        description: 'Only process issues with this label (leave blank for all)'
        required: false
        default: ''
      max_iter:
        description: 'Max issues to process (0 = no limit)'
        required: false
        default: '0'

jobs:
  autoloop:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install gh-autoloop
        run: pip install .

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name  "gh-autoloop[bot]"
          git config user.email "gh-autoloop[bot]@users.noreply.github.com"

      - name: Run autoloop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          gh-autoloop run \
            --repo . \
            --label "${{ github.event.inputs.label }}" \
            --max-iter "${{ github.event.inputs.max_iter || '0' }}"
